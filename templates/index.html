<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMate AI — Your Mental Health Companion</title>
    <meta name="description" content="MindMate AI is your personal AI-powered mental health companion for thoughtful, empathetic conversations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ──────────────────────────── */
        :root {
            --font-heading:  'Poppins', sans-serif;
            --font-body:     'Inter',   sans-serif;

            --color-bg:          #0D1117;
            --color-surface:     #161B22;
            --color-surface-2:   #1E2530;
            --color-border:      #2D3748;
            --color-accent:      #7C6EE8;
            --color-accent-2:    #C084FC;
            --color-text:        #E6EDF3;
            --color-text-muted:  #8B949E;
            --color-user-bubble: #1E2D40;
            --color-bot-bubble:  #161B22;
        }

        /* ── Reset & Base ───────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            font-weight: 400;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        /* ── Layout ─────────────────────────────────── */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            padding: 0 24px;
        }

        /* ── Header ─────────────────────────────────── */
        .app-header {
            padding: 28px 0 20px;
            text-align: center;
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C6EE8 0%, #C084FC 100%);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        h1.app-title {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(90deg, #A78BFA 0%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .app-subtitle {
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--color-text-muted);
            letter-spacing: 0.01em;
        }

        /* ── Theme Toggle ────────────────────────────── */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--color-surface);
            color: var(--color-text-muted);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 100;
        }

        .theme-toggle:hover {
            background: var(--color-surface-2);
            border-color: var(--color-accent);
        }

        /* ── Chat Box ────────────────────────────────── */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 999px; }

        /* ── Messages ────────────────────────────────── */
        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.bot  { justify-content: flex-start; }

        .message-inner {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 78%;
        }

        .message-row.user .message-inner { flex-direction: row-reverse; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .avatar.user-avatar {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
        }

        .avatar.bot-avatar {
            background: linear-gradient(135deg, #7C6EE8 0%, #C084FC 100%);
            color: #fff;
        }

        .message-bubble {
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            font-family: var(--font-body);
            font-size: 0.9375rem;
            font-weight: 400;
            line-height: 1.65;
            letter-spacing: 0.01em;
            color: var(--color-text);
        }

        .message-row.user .message-bubble {
            background: var(--color-user-bubble);
            border-color: #1F3A55;
            border-radius: 16px 4px 16px 16px;
        }

        .message-row.bot .message-bubble {
            background: var(--color-bot-bubble);
            border-radius: 4px 16px 16px 16px;
        }

        .sender-label {
            font-family: var(--font-body);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .message-row.user .sender-label { color: #7BA7D4; }
        .message-row.bot  .sender-label { color: var(--color-accent-2); }

        /* ── Welcome State ───────────────────────────── */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 24px;
            padding-bottom: 60px;
            text-align: center;
        }

        .welcome-state h2 {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 8px;
        }

        .welcome-state p {
            font-family: var(--font-body);
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        /* ── Input Area ──────────────────────────────── */
        .input-area {
            padding: 16px 0 24px;
            flex-shrink: 0;
        }

        .input-form {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 10px 10px 10px 18px;
            transition: border-color 0.2s;
        }

        .input-form:focus-within {
            border-color: var(--color-accent);
        }

        .input-form input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: 0.9375rem;
            font-weight: 400;
            line-height: 1.5;
        }

        .input-form input[type="text"]::placeholder {
            color: var(--color-text-muted);
            opacity: 0.7;
        }

        .send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #7C6EE8 0%, #C084FC 100%);
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .send-btn:disabled {
            background: var(--color-surface-2);
            color: var(--color-text-muted);
            cursor: not-allowed;
        }

        .send-btn:not(:disabled):hover { opacity: 0.88; }

        /* ── Footer ──────────────────────────────────── */
        .footer-note {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--color-text-muted);
            text-align: center;
            margin-top: 10px;
            letter-spacing: 0.01em;
        }

        /* ── Thinking indicator ───────────────────────── */
        .thinking-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 4px;
            color: var(--color-text-muted);
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 400;
            font-style: italic;
        }

        .thinking-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-accent);
            animation: pulse 1.4s infinite ease-in-out;
        }

        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40%            { transform: scale(1);   opacity: 1;   }
        }

        /* ── Light theme override ─────────────────────── */
        body.light {
            --color-bg:          #F4F6FA;
            --color-surface:     #FFFFFF;
            --color-surface-2:   #EEF1F8;
            --color-border:      #DDE2EE;
            --color-text:        #1A1E2E;
            --color-text-muted:  #6B7280;
            --color-user-bubble: #EAF0FB;
            --color-bot-bubble:  #FFFFFF;
        }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 600px) {
            .app-wrapper { padding: 0 14px; }
            h1.app-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">🌙</button>

    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="header-inner">
                <span class="logo-icon">🧠</span>
                <h1 class="app-title">MindMate AI</h1>
            </div>
            <p class="app-subtitle">Your personal mental health companion — always here to listen</p>
        </header>

        <!-- Chat Box -->
        <div class="chat-box" id="chat-box">
            <div class="welcome-state" id="welcome-state">
                <div>
                    <h2>How are you feeling today?</h2>
                    <p>Share what's on your mind — I'm here to help.</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form class="input-form" id="chat-form" autocomplete="off">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Type your feelings or questions…"
                    required
                />
                <button type="submit" class="send-btn" id="send-btn">➤</button>
            </form>
            <p class="footer-note">
                MindMate AI · © 2025 Likith &amp; Nithin · For support, not professional therapy
            </p>
        </div>
    </div>

    <script>
        // ── Theme Toggle ───────────────────────────────────────────
        const themeToggle = document.getElementById('theme-toggle');
        function setTheme(light) {
            document.body.classList.toggle('light', light);
            themeToggle.textContent = light ? '🌙' : '☀️';
            localStorage.setItem('mindmateai-theme', light ? 'light' : 'dark');
        }
        let isLight = localStorage.getItem('mindmateai-theme') === 'light';
        setTheme(isLight);
        themeToggle.onclick = () => { isLight = !isLight; setTheme(isLight); };

        // ── Chat Logic ─────────────────────────────────────────────
        const chatBox      = document.getElementById('chat-box');
        const welcomeState = document.getElementById('welcome-state');
        const chatForm     = document.getElementById('chat-form');
        const userInput    = document.getElementById('user-input');
        const sendBtn      = document.getElementById('send-btn');

        function appendMessage(content, role) {
            if (welcomeState) welcomeState.remove();

            const row   = document.createElement('div');
            row.className = `message-row ${role}`;

            const inner = document.createElement('div');
            inner.className = 'message-inner';

            const avatar = document.createElement('div');
            avatar.className = `avatar ${role === 'user' ? 'user-avatar' : 'bot-avatar'}`;
            avatar.textContent = role === 'user' ? '👤' : '🧠';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            const label = document.createElement('div');
            label.className = 'sender-label';
            label.textContent = role === 'user' ? 'You' : 'MindMate';

            const text = document.createElement('div');
            text.style.whiteSpace = 'pre-wrap';
            text.innerHTML = content;

            bubble.appendChild(label);
            bubble.appendChild(text);
            inner.appendChild(avatar);
            inner.appendChild(bubble);
            row.appendChild(inner);
            chatBox.appendChild(row);

            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
            return row;
        }

        function showThinking() {
            const row = document.createElement('div');
            row.id = 'thinking-row';
            row.className = 'thinking-row';
            row.innerHTML = `
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
                <span style="margin-left:4px;">MindMate is thinking…</span>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinking-row');
            if (el) el.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = userInput.value.trim();
            if (!question) return;

            appendMessage(question, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            showThinking();

            try {
                const resp = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await resp.json();
                hideThinking();
                if (resp.ok && data.answer) {
                    appendMessage(data.answer, 'bot');
                } else {
                    appendMessage('Sorry, I could not process your request. Please try again.', 'bot');
                }
            } catch {
                hideThinking();
                appendMessage('An error occurred. Please try again later.', 'bot');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        // Keep send button state in sync with input
        userInput.addEventListener('input', () => {
            sendBtn.disabled = !userInput.value.trim();
        });
        sendBtn.disabled = true;
    </script>
</body>
</html>
